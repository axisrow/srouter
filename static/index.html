<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tunnel Dashboard</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.min.css">
  <style>
    body { padding-bottom: 3rem; }
    .spark { display: block; }
    .val-big { font-size: 1.9rem; font-weight: 600; line-height: 1.1; }
    .val-xl  { font-size: 2.6rem; font-weight: 700; line-height: 1.05; }
    .card-icon { font-size: 1.25rem; opacity: .75; }
    .sub { font-size: .85rem; }
    .mono { font-variant-numeric: tabular-nums; }
    .headline-card { border-width: 2px; }
    .pulse { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .35; } }
    .toast-container { z-index: 1090; }
    /* cinematic */
    body.mode-simple .cine { display: none !important; }
    .flow-strip { display:flex; flex-wrap:wrap; align-items:stretch; gap:.5rem; }
    .flow-node { flex:1 1 0; min-width:150px; border:1px solid var(--bs-border-color);
      border-radius:.6rem; padding:.6rem .75rem; background:var(--bs-body-bg);
      position:relative; overflow:hidden; }
    .flow-node .flag { font-size:1.6rem; line-height:1; }
    .flow-node .ip { font-size:1.05rem; font-weight:600; }
    .flow-node .role { font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; opacity:.6; }
    .flow-node .meta { font-size:.72rem; opacity:.75; margin-top:.2rem; }
    .flow-arrow { display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-width:54px; color:var(--bs-secondary-color); font-family:var(--bs-font-monospace); }
    .flow-arrow .rtt { font-size:.7rem; opacity:.85; }
    .flow-node.live::after { content:""; position:absolute; left:0; top:0; height:2px; width:100%;
      background:linear-gradient(90deg,transparent,var(--bs-primary),transparent);
      animation:scan 2.2s linear infinite; }
    @keyframes scan { 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
    /* leak: выход цепочки совпал с прямым выходом — реальный IP утёк мимо цепочки. */
    .flow-node.leak { border-color:var(--bs-danger); box-shadow:0 0 0 1px var(--bs-danger) inset; }
    .flow-node .leak-badge { display:inline-block; font-size:.6rem; font-weight:700; letter-spacing:.06em;
      text-transform:uppercase; color:#fff; background:var(--bs-danger); border-radius:.3rem;
      padding:0 .3rem; margin-left:.35rem; vertical-align:middle; }
    .ops { font-family:var(--bs-font-monospace); font-size:.82rem; }
    .ops .k { opacity:.6; }
    .dns-pill { font-family:var(--bs-font-monospace); font-size:.75rem; }
    .dns-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-left:4px; }
    .dns-up { background:#3fb950; } .dns-down { background:#f85149; }
    .node-row { border:1px solid var(--bs-border-color); border-radius:.6rem; padding:.75rem;
      background:var(--bs-body-bg); }
    .node-row + .node-row { margin-top:.5rem; }
    .node-row.active { border-color:rgba(var(--bs-success-rgb), .55); }
    .node-row.best { box-shadow:inset 3px 0 0 var(--bs-primary); }
    .node-row.pending { border-color:rgba(var(--bs-warning-rgb), .65); }
    .node-row.failed { border-color:rgba(var(--bs-danger-rgb), .55); }
    .node-metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:.35rem .75rem; }
    .node-metric .k { display:block; font-size:.72rem; color:var(--bs-secondary-color); }
    .hot-route-list { display:grid; gap:.25rem; max-height:9rem; overflow:auto; }
    .hot-route-row { display:flex; justify-content:space-between; gap:.75rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand bg-body-tertiary border-bottom mb-3">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-shield-lock-fill text-primary"></i>
        <span data-i18n="brand">Tunnel Dashboard</span>
      </span>

        <span id="updated" class="text-secondary small mono d-none d-sm-inline">—</span>
        <select id="langSel" class="form-select form-select-sm" style="width:auto"
                data-i18n-title="lang_title" data-i18n-aria="lang_title">
          <option value="en">EN</option>
          <option value="ru">RU</option>
          <option value="zh">中文</option>
        </select>
        <select id="themeSel" class="form-select form-select-sm" style="width:auto"
                data-i18n-title="theme_title" data-i18n-aria="theme_title">
          <option value="auto" data-i18n="theme_auto">Auto</option>
          <option value="light" data-i18n="theme_light">Light</option>
          <option value="dark" data-i18n="theme_dark">Dark</option>
        </select>
        <button id="modeBtn" class="btn btn-sm btn-outline-secondary" type="button"
                data-i18n-title="mode_cinematic" data-i18n-aria="mode_cinematic">
          <i class="bi bi-eye"></i>
        </button>
        <button id="refreshBtn" class="btn btn-sm btn-outline-primary" type="button">
          <i class="bi bi-arrow-clockwise"></i>
          <span class="d-none d-md-inline" data-i18n="refresh">Refresh</span>
        </button>
      </div>
    </div>

        <div id="flow-strip" class="flow-strip"></div>
      </div>
    </div>

    <div id="cards" class="row g-3"></div>

    <div class="card mt-3">
      <div class="card-header d-flex align-items-center">
        <i class="bi bi-hdd-rack me-2"></i>
        <span data-i18n="node_selector_title">Node selection</span>

      </div>
      <div class="card-body">
        <div id="node-selector"></div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-header d-flex align-items-center">
        <i class="bi bi-wifi me-2"></i>
        <span data-i18n="channel_title">Network channel</span>
        <span class="ms-auto badge bg-secondary ops" id="channel-badge">—</span>
      </div>
      <div class="card-body">
        <div id="channel-panel"></div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-header d-flex align-items-center">
        <i class="bi bi-shield-check me-2"></i>
        <span data-i18n="guard_title">Traffic Guard</span>
        <span class="ms-auto badge bg-secondary ops" id="guard-badge">—</span>
      </div>
      <div class="card-body">
        <div id="guard-editor"></div>
        <hr class="my-3">
        <div id="throttle-editor"></div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-header d-flex align-items-center">
        <i class="bi bi-shield-lock me-2"></i>
        <span data-i18n="isolate_title">Domain isolation (PF)</span>
        <span class="ms-auto badge bg-secondary ops" id="isolate-badge">—</span>
      </div>
      <div class="card-body">
        <div id="isolate-editor"></div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-header d-flex align-items-center">
        <i class="bi bi-sliders me-2"></i> <span data-i18n="ctrl_title">Control</span>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12 col-lg-6">
            <div class="fw-semibold mb-2"><i class="bi bi-funnel"></i> privoxy</div>
            <div class="btn-group w-100" role="group">
              <button class="btn btn-outline-success act" data-url="/api/service/privoxy/start"><span class="lbl">Start</span></button>
              <button class="btn btn-outline-danger act"  data-url="/api/service/privoxy/stop"><span class="lbl">Stop</span></button>
              <button class="btn btn-outline-secondary act" data-url="/api/service/privoxy/restart"><span class="lbl">Restart</span></button>
            </div>
          </div>

            <div class="btn-group w-100" role="group">

              <button class="btn btn-outline-secondary act" data-url="/api/service/xray/restart"><span class="lbl">Restart</span></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

    function detectLang() {
      var saved = localStorage.getItem('lang');
      if (saved && I18N[saved]) return saved;
      var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (nav.indexOf('zh') === 0) return 'zh';
      if (nav.indexOf('ru') === 0) return 'ru';
      return 'en';
    }
    var LANG = detectLang();
    function t(key) {
      var table = I18N[LANG] || I18N.en;
      var s = table[key];
      if (s == null) s = I18N.en[key];
      if (s == null) return key;
      if (arguments.length > 1) {
        for (var i = 1; i < arguments.length; i++) {
          // split/join, а не String.replace: replacementString трактует $&, $`, $', $n
          // как спец-паттерны, искажая server error и URL в подставляемом тексте (#12).
          s = s.split('{' + (i - 1) + '}').join(String(arguments[i]));
        }
      }
      return s;
    }
    function applyStaticI18n() {
      document.documentElement.lang = LANG;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('[data-i18n-title]').forEach(function (el) {
        el.setAttribute('title', t(el.getAttribute('data-i18n-title')));
      });
      document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
        el.setAttribute('aria-label', t(el.getAttribute('data-i18n-aria')));
      });
    }

    /* ============================ Theme ============================ */
    var mql = window.matchMedia('(prefers-color-scheme: dark)');
    function applyTheme() {
      var pref = localStorage.getItem('theme') || 'auto';
      var dark = (pref === 'auto') ? mql.matches : (pref === 'dark');
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    }
    var themeSel = document.getElementById('themeSel');
    themeSel.value = localStorage.getItem('theme') || 'auto';
    themeSel.addEventListener('change', function () {
      localStorage.setItem('theme', themeSel.value);
      applyTheme();
    });
    mql.addEventListener('change', applyTheme);
    applyTheme();

    /* ============================ Helpers ============================ */
    var BADGE = { ok: 'bg-success', warn: 'bg-warning text-dark', down: 'bg-danger' };
    function badgeClass(s) { return BADGE[s] || 'bg-secondary'; }
    function badgeText(s) {
      return ({ ok: 'OK', warn: 'WARN', down: 'DOWN' })[s] || (s ? String(s).toUpperCase() : 'N/A');
    }
    function esc(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function flag(cc) {
      if (!cc || cc.length !== 2 || !/^[A-Za-z]{2}$/.test(cc)) return '';
      cc = cc.toUpperCase();
      return String.fromCodePoint(0x1F1E6 + cc.charCodeAt(0) - 65) +
             String.fromCodePoint(0x1F1E6 + cc.charCodeAt(1) - 65);
    }
    function geoLine(n) {
      if (!n || !n.ip) return t('no_data');
      var loc = [n.city, n.country].filter(Boolean).map(esc).join(', ');
      var isp = n.isp ? esc(n.isp) : '';
      var asn = n.asn ? ('AS' + esc(String(n.asn).replace(/^AS/i, ''))) : '';
      return [loc, isp, asn].filter(Boolean).join(' · ') || t('no_geo');
    }
    // Badge карточки Public DNS считаем из public reachability (dns.public), а НЕ из
    // dns.status (тот отражает системный scutil-resolver, находка #6). Не смешиваем
    // системный resolver и достижимость публичных DNS.
    function dnsCardStatus(dns) {
      var pub = (dns && dns.public) || [];
      if (!pub.length) return 'unknown';
      var up = pub.filter(function (s) { return s && s.up; }).length;
      if (up === 0) return 'down';
      if (up < pub.length) return 'warn';
      return 'ok';
    }

    /* ============================ Sparkline ============================ */
    var HISTORY = {};
    var MAXH = 20;
    function pushHistory(key, ms) {
      if (typeof ms !== 'number' || !isFinite(ms)) return;
      var a = HISTORY[key] || (HISTORY[key] = []);
      a.push(ms);
      if (a.length > MAXH) a.shift();
    }
    function sparkline(key, color) {
      var a = HISTORY[key] || [];
      var W = 110, H = 30, pad = 2;
      if (a.length < 2) {
        return '<svg class="spark" width="' + W + '" height="' + H + '" role="img" aria-label="' + esc(t('spark_empty')) + '">' +
               '<text x="' + (W / 2) + '" y="' + (H / 2 + 4) + '" text-anchor="middle" ' +
               'font-size="10" fill="currentColor" opacity="0.5">—</text></svg>';
      }
      var min = Math.min.apply(null, a), max = Math.max.apply(null, a);
      var span = (max - min) || 1;
      var n = a.length;
      var pts = a.map(function (v, i) {
        var x = pad + (W - 2 * pad) * (i / (n - 1));
        var y = pad + (H - 2 * pad) * (1 - (v - min) / span);
        return x.toFixed(1) + ',' + y.toFixed(1);
      });
      var last = a[a.length - 1];
      var lastPt = pts[pts.length - 1].split(',');
      return '<svg class="spark" width="' + W + '" height="' + H + '" role="img" ' +
             'aria-label="' + esc(t('spark_label', n, last)) + '">' +
             '<polyline fill="none" stroke="' + color + '" stroke-width="1.5" ' +
             'stroke-linejoin="round" stroke-linecap="round" points="' + pts.join(' ') + '"/>' +
             '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="2" fill="' + color + '"/>' +
             '</svg>';
    }
    function sparkColor(status) {
      return status === 'down' ? '#dc3545' : status === 'warn' ? '#ffc107' : '#0d6efd';
    }

    /* ============================ Toasts ============================ */
    var toastBox = document.querySelector('.toast-container');
    function toast(msg, kind) {
      var cls = ({ ok: 'text-bg-success', warn: 'text-bg-warning', err: 'text-bg-danger' })[kind] || 'text-bg-secondary';
      var el = document.createElement('div');
      el.className = 'toast align-items-center border-0 ' + cls;
      el.setAttribute('role', 'alert');
      el.innerHTML =
        '<div class="d-flex">' +
          '<div class="toast-body">' + esc(msg) + '</div>' +
          '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>' +
        '</div>';
      toastBox.appendChild(el);
      var tt = new bootstrap.Toast(el, { delay: 5000 });
      tt.show();
      el.addEventListener('hidden.bs.toast', function () { el.remove(); });
    }

    /* ============================ Card builder ============================ */
    function card(opts) {
      var col = opts.col || 'col-12 col-md-6 col-xl-4';
      var spark = opts.sparkKey
        ? '<div class="mt-2 text-secondary">' + sparkline(opts.sparkKey, sparkColor(opts.status)) + '</div>'
        : '';
      return '' +
        '<div class="' + col + '">' +
          '<div class="card h-100">' +
            '<div class="card-body">' +
              '<div class="d-flex align-items-start">' +
                '<div class="me-auto">' +
                  '<div class="text-secondary text-uppercase small fw-semibold">' +
                    '<i class="bi ' + opts.icon + ' card-icon"></i> ' + esc(opts.title) + '</div>' +

    function svcLine(s) {
      if (!s) return t('no_data');

             ' · brew: ' + esc(s.brew || 'unknown');

    /* ============================ Render ============================ */
    var LAST_STATUS = null;
    var LAST_RANKING = null;
    var NODE_APPLY = null;
    // Последняя попытка ручного переключения канала (pending/failed), как NODE_APPLY.
    var CHANNEL_APPLY = null;
    // true после renderFetchFailed: панели показывают «нет связи с сервером»,
    // и перерисовки из stale LAST_STATUS должны молчать до успешного поллинга.
    var FETCH_FAILED = false;
    var MUTATION = null;
    /* Модель редактора Traffic Guard. GUARD_DIRTY защищает несохранённые правки
       от перезаписи фоновым поллингом /api/guard. */
    var GUARD_MODEL = { mode: 'off', rows: [] };
    var GUARD_DIRTY = false;
    var GUARD_LOADED = false;
    // editable=false когда state в auto (#23): редактор read-only + баннер.
    var GUARD_EDITABLE = true;

    function num(v) {
      if (v === null || v === undefined || v === '') return null;
      var n = Number(v);
      return isFinite(n) ? n : null;
    }
    function fmtNumber(v) {
      var n = num(v);
      if (n === null) return '—';
      return (Math.round(n) === n ? n : n.toFixed(1)).toLocaleString();
    }
    function fmtScore(v) {
      var n = num(v);
      return n === null ? t('node_no_score') : Math.round(n * 100) + '%';
    }
    function fmtLatency(v) {
      var n = num(v);
      return n === null ? '—' : fmtNumber(n) + ' ' + t('ms');
    }
    function fmtThroughput(v) {
      var n = num(v);
      return n === null ? '—' : Math.round(n).toLocaleString() + ' ' + t('kbps');
    }
    function hotRoutesSub(hr) {
      var help = '<div class="sub text-secondary mt-2">' + esc(t('hot_routes_help')) + '</div>';
      if (!hr || hr.enabled !== true) return esc(t('hot_routes_disabled')) + help;

      if (!domains.length) return esc(t('hot_routes_empty')) + help;
      var rows = '<div class="hot-route-row text-secondary small">' +
        '<span>' + esc(t('guard_domain')) + '</span>' +
        '<span>' + esc(t('hot_routes_count')) + '</span>' +
      '</div>' + domains.map(function (entry) {
        var domain = entry && entry.domain ? entry.domain : '';
        var count = entry && entry.count != null ? fmtNumber(entry.count) : '—';
        return '<div class="hot-route-row">' +
          '<span class="mono text-truncate">' + esc(domain || '—') + '</span>' +
          '<span class="mono text-secondary">' + esc(count) + '</span>' +

        rows + '</div>' + help;
    }
    function nodeApplyPending() {
      return !!(NODE_APPLY && NODE_APPLY.state === 'pending');
    }
    function mutationInFlight() {
      return !!MUTATION;
    }
    function setMutationControlsDisabled(on) {
      document.querySelectorAll('.act').forEach(function (b) { b.disabled = on; });
    }
    function tryBeginMutation(kind, ev) {
      if (mutationInFlight()) {
        if (ev) ev.preventDefault();
        toast(t('action_in_progress'), 'warn');
        return false;
      }
      MUTATION = { kind: kind };
      paused = true;
      setMutationControlsDisabled(true);
      return true;
    }
    function finishMutation() {
      MUTATION = null;
      paused = false;
      setMutationControlsDisabled(false);
      // Blanket-enable выше снимает disabled и с кнопок, заглушённых гейтингом
      // доступности канала — переприменяем гейтинг перерисовкой панели
      // (канон: saveGuard так же перерисовывает редактор после finishMutation).
      // При упавшем поллинге панель показывает no_server — не затираем её stale-данными.
      if (!FETCH_FAILED) renderChannel(LAST_STATUS || {});
    }
    function nodeGeoText(node) {
      var geo = node && typeof node.geo === 'object' && node.geo ? node.geo : {};
      var cc = geo.country_code || node.country_code || '';
      var fl = flag(cc);
      var loc = [geo.city, geo.country].filter(Boolean).join(', ');
      if (!loc && cc) loc = cc.toUpperCase();
      return [fl, loc].filter(Boolean).join(' ') || t('no_geo');
    }
    function recommendationLabel(ranking) {
      var rec = ranking && ranking.recommendation ? String(ranking.recommendation) : '';
      if (rec.indexOf('switch:') === 0) return t('node_recommend_switch', rec.slice(7));
      if (rec === 'hold') return t('node_recommend_hold');
      if (rec === 'no-data') return t('node_recommend_no_data');
      return rec || t('node_recommend_no_data');
    }
    function buildNodeRows(statusNodes, ranking) {
      var nodes = Array.isArray(statusNodes) ? statusNodes : [];
      var ranked = Array.isArray(ranking && ranking.score_window) ? ranking.score_window : [];
      var byName = {};
      nodes.forEach(function (node) {
        if (node && node.name) byName[node.name] = node;
      });
      var seen = {};
      var rows = ranked.map(function (scoreRow) {
        var name = scoreRow && scoreRow.name ? scoreRow.name : '';
        seen[name] = true;
        var node = byName[name] || { name: name };
        return Object.assign({}, node, {
          score: scoreRow ? scoreRow.score : node.score,
          rank: scoreRow ? scoreRow.rank : node.rank,
          status: (scoreRow && scoreRow.status) || node.status
        });
      });
      nodes.forEach(function (node) {
        if (node && node.name && !seen[node.name]) rows.push(node);
      });
      return rows;
    }
    function nodeStatusBadges(row, activeName, bestName, pendingName, failedName) {
      var badges = [];
      if (row.name === activeName) badges.push('<span class="badge text-bg-success">' + esc(t('active')) + '</span>');
      if (row.name === bestName) badges.push('<span class="badge text-bg-primary">' + esc(t('node_best')) + '</span>');
      if (row.name === pendingName) badges.push('<span class="badge text-bg-warning">' + esc(t('node_pending')) + '</span>');
      if (row.name === failedName) badges.push('<span class="badge text-bg-danger">' + esc(t('node_failed')) + '</span>');
      badges.push('<span class="badge ' + badgeClass(row.status) + '">' + esc(badgeText(row.status)) + '</span>');
      return badges.join(' ');
    }
    function renderNodeSelector(d, ranking) {
      var box = document.getElementById('node-selector');
      var badge = document.getElementById('node-selector-badge');
      if (!box) return;
      ranking = ranking || {};
      var rows = buildNodeRows(d && d.nodes, ranking);
      var activeName = ranking.active || '';
      var bestName = ranking.best || '';
      var pendingName = (ranking.pending || (d && d.active_node && d.active_node.pending) ||
        (NODE_APPLY && NODE_APPLY.state === 'pending' ? NODE_APPLY.name : ''));
      var failedName = (ranking.failed || (NODE_APPLY && NODE_APPLY.state === 'failed' ? NODE_APPLY.name : ''));
      if (badge) {
        badge.className = 'ms-auto badge ops ' + (rows.length ? 'bg-primary' : 'bg-secondary');
        badge.textContent = rows.length ? t('node_selector_badge', rows.length) : '—';
      }
      if (!rows.length) {
        box.innerHTML = '<div class="text-secondary ops">' + esc(t('node_selector_empty')) + '</div>';
        return;
      }
      var route = (d && d.route) || {};
      var summary = '<div class="d-flex flex-wrap gap-2 mb-3 ops">' +
        '<span class="badge text-bg-light">' + esc(t('node_recommend_label')) + ': ' +
          esc(recommendationLabel(ranking)) + '</span>' +
        '<span class="badge text-bg-light">' + esc(t('active')) + ': ' + esc(activeName || '—') + '</span>' +
        '<span class="badge text-bg-light">' + esc(route.split_active ? t('split_on') : t('split_off')) + '</span>' +
        '</div>';
      var html = rows.map(function (row, idx) {
        var rank = row.rank || (idx + 1);
        var statusClass = 'node-row' + (row.name === activeName ? ' active' : '') +
          (row.name === bestName ? ' best' : '') + (row.name === pendingName ? ' pending' : '') +
          (row.name === failedName ? ' failed' : '');
        var applyBusy = nodeApplyPending();
        var selected = row.name === activeName;
        var button = selected
          ? '<button class="btn btn-sm btn-outline-success" type="button" disabled>' +
            '<i class="bi bi-check2"></i> ' + esc(t('node_selected')) + '</button>'
          : '<button class="btn btn-sm btn-outline-primary act node-select" type="button" ' +
            'data-node-name="' + esc(row.name || '') + '"' + (applyBusy ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-arrow-right-circle"></i> ' + esc(t('node_select')) + '</span></button>';
        return '<div class="' + statusClass + '">' +
          '<div class="d-flex flex-wrap align-items-start gap-2">' +
            '<div class="me-auto">' +
              '<div class="d-flex flex-wrap align-items-center gap-2">' +
                '<span class="fw-semibold mono">' + esc(row.name || '—') + '</span>' +
                '<span class="text-secondary small">' + esc(t('node_rank', rank)) + '</span>' +
                nodeStatusBadges(row, activeName, bestName, pendingName, failedName) +
              '</div>' +
              '<div class="node-metrics mt-2 ops">' +
                '<div class="node-metric"><span class="k">' + esc(t('node_score')) + '</span>' + esc(fmtScore(row.score)) + '</div>' +
                '<div class="node-metric"><span class="k">' + esc(t('node_latency')) + '</span>' + esc(fmtLatency(row.ping_ms)) + '</div>' +
                '<div class="node-metric"><span class="k">' + esc(t('node_throughput')) + '</span>' + esc(fmtThroughput(row.throughput_kbps)) + '</div>' +
                '<div class="node-metric"><span class="k">' + esc(t('node_geo')) + '</span>' + esc(nodeGeoText(row)) + '</div>' +
                '<div class="node-metric"><span class="k">' + esc(t('node_endpoint')) + '</span><span class="mono">' + esc(row.endpoint_host || '—') + '</span></div>' +
                '<div class="node-metric"><span class="k">' + esc(t('node_route_ip')) + '</span><span class="mono">' + esc(row.route_ip || '—') + '</span></div>' +
              '</div>' +
            '</div>' +
            '<div class="ms-auto">' + button + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      box.innerHTML = summary + html;
    }

    /* ============================ Channel failover (Wi-Fi / USB) ============================ */
    /* Наблюдение + ручное переключение (issue #16). Никакого фонового авто-переключения:
       канал меняется ТОЛЬКО по клику пользователя через POST /api/channel/<target>. */
    var CHANNEL_TARGETS = ['wifi', 'usb'];
    function channelKeyForTarget(target) {
      // target API (wifi|usb) -> классификация канала из probe_connectivity/probe_ifaces.
      return target === 'usb' ? 'usb_tether' : 'wifi';
    }
    function channelLabel(channel) {
      if (channel === 'wifi') return t('channel_wifi');
      if (channel === 'usb_tether') return t('channel_usb');
      if (channel === 'other') return t('channel_other');
      return t('channel_unknown');
    }
    function channelTargetLabel(target) {
      return channelLabel(channelKeyForTarget(target));
    }
    function channelLinkAvailable(d, target) {
      /* Цель доступна = у неё есть поднятый интерфейс с адресом (probe_ifaces).
         Реальный reachability-пробник есть только для активного канала, поэтому
         для standby-цели link-up — лучший доступный сигнал. */
      var wanted = channelKeyForTarget(target);
      var list = (d && d.ifaces && Array.isArray(d.ifaces.ifaces)) ? d.ifaces.ifaces : [];
      return list.some(function (i) { return i && i.channel === wanted; });
    }
    function channelSwitchAllowed(d, conn, target) {
      /* Fail-open гейтинг (ревью PR #64): блокируем standby-цель ТОЛЬКО когда
         данные пробы здоровы И активный канал подтверждённо работает — штатный
         кейс «кабель не воткнут». В аварийном/деградированном состоянии кнопка
         остаётся активной: ручной failover — это recovery-путь, а авторитет
         доступности — backend switch_channel (сам включает выключенный сервис
         и вернёт структурную ошибку, если цели действительно нет). */
      if (channelLinkAvailable(d, target)) return true;
      var ifd = d && d.ifaces;
      var ifacesHealthy = !!(ifd && ifd.status === 'ok' &&
        Array.isArray(ifd.ifaces) && ifd.ifaces.length);
      if (!ifacesHealthy) return true;            // нет данных ≠ цели нет
      if (!conn || conn.reachable !== true) return true;  // активный канал не подтверждён — не блокируем recovery
      return false;
    }
    function channelReachText(conn) {
      var reach = (conn && typeof conn.reachability === 'object' && conn.reachability) ? conn.reachability : {};
      if (conn && conn.reachable === true) {
        var bits = [t('reachable')];
        if (reach.code && reach.code !== '000') bits.push('HTTP ' + reach.code);
        if (typeof reach.ms === 'number' && isFinite(reach.ms)) bits.push(reach.ms + ' ' + t('ms'));
        return bits.join(' · ');
      }
      if (conn && conn.reachable === false) return t('unreachable');
      return t('no_data');
    }
    function channelButtonHtml(d, target, conn) {
      var label = channelTargetLabel(target);
      var icon = target === 'wifi' ? 'bi-wifi' : 'bi-usb-symbol';
      var isActive = conn && conn.channel === channelKeyForTarget(target);
      if (isActive) {
        return '<button class="btn btn-sm btn-outline-success" type="button" disabled>' +
          '<i class="bi bi-check2"></i> ' + esc(label) + ' · ' + esc(t('active')) + '</button>';
      }
      var allowed = channelSwitchAllowed(d, conn, target);
      var busy = mutationInFlight() || !!(CHANNEL_APPLY && CHANNEL_APPLY.state === 'pending');
      var title = allowed ? t('channel_switch_to', label) : t('channel_link_down');
      return '<button class="btn btn-sm btn-outline-primary act channel-switch" type="button" ' +
        'data-channel-target="' + esc(target) + '"' + ((busy || !allowed) ? ' disabled' : '') +
        ' title="' + esc(title) + '" aria-label="' + esc(title) + '">' +
        '<span class="lbl"><i class="bi ' + icon + '"></i> ' + esc(t('channel_switch_to', label)) + '</span></button>';
    }
    function renderChannel(d) {
      var box = document.getElementById('channel-panel');
      var badge = document.getElementById('channel-badge');
      if (!box) return;
      var conn = (d && typeof d.connectivity === 'object' && d.connectivity) ? d.connectivity : {};
      if (badge) {
        badge.className = 'ms-auto badge ops ' + badgeClass(conn.status);
        badge.textContent = badgeText(conn.status);
      }
      var summary = '<div class="d-flex flex-wrap gap-2 mb-3 ops">' +
        '<span class="badge text-bg-light">' + esc(t('channel_active')) + ': ' +
          esc(channelLabel(conn.channel)) + '</span>' +
        '<span class="badge text-bg-light">' + esc(t('iface')) + ' ' +
          esc(conn.active_iface || '—') + (conn.addr ? ' · ' + esc(conn.addr) : '') + '</span>' +
        '<span class="badge text-bg-light">' + esc(channelReachText(conn)) + '</span>' +
        (conn.hardware_port ? '<span class="badge text-bg-light">' + esc(conn.hardware_port) + '</span>' : '') +
        (conn.metered === true ? '<span class="badge text-bg-warning">' + esc(t('channel_metered')) + '</span>' : '') +
        '</div>';
      var buttons = '<div class="d-flex flex-wrap gap-2 mb-2">' +
        CHANNEL_TARGETS.map(function (target) { return channelButtonHtml(d, target, conn); }).join('') +
        '</div>';
      var failed = (CHANNEL_APPLY && CHANNEL_APPLY.state === 'failed')
        ? '<div class="sub text-danger mb-2">' +
            esc(t('channel_last_error', String(CHANNEL_APPLY.error || '').slice(0, 200))) + '</div>'
        : '';
      box.innerHTML = summary + buttons + failed +
        '<div class="sub text-secondary">' + esc(t('channel_manual_hint')) + '</div>';
    }

    /* ============================ Traffic Guard editor ============================ */
    function guardModeOn() { return GUARD_MODEL.mode === 'on'; }
    function guardRowsToDomains() {
      /* Собрать карту domain->policy из строк редактора. Пустые домены пропускаем,
         дубликаты — оставляем последнюю политику (backend всё равно провалидирует). */
      var out = {};
      GUARD_MODEL.rows.forEach(function (row) {
        var domain = (row.domain || '').trim().toLowerCase();
        if (!domain) return;
        out[domain] = (row.policy === 'allow') ? 'allow' : 'block';
      });
      return out;
    }
    function guardDomainsToRows(domains) {
      /* Нормализовать серверную карту в строки редактора (сортировка для стабильности). */
      var rows = [];
      if (domains && typeof domains === 'object') {
        Object.keys(domains).sort().forEach(function (domain) {
          rows.push({ domain: domain, policy: domains[domain] === 'allow' ? 'allow' : 'block' });
        });
      }
      return rows;
    }
    function syncGuardFromServer(payload) {
      /* Обновить модель из /api/guard, только если пользователь ничего не редактирует. */
      if (GUARD_DIRTY) return;
      var serverMode = payload && payload.mode;
      // editable: сервер шлёт явный флаг; auto (#23) → read-only с баннером,
      // плоскую проекцию канала не редактируем (иначе затрём channel-map при save).
      GUARD_EDITABLE = payload ? (payload.editable !== false && serverMode !== 'auto') : true;
      GUARD_MODEL = {
        mode: GUARD_EDITABLE ? (serverMode === 'on' ? 'on' : 'off') : 'auto',
        rows: GUARD_EDITABLE ? guardDomainsToRows(payload && payload.domains) : []
      };
      GUARD_LOADED = true;
      renderGuard();
    }
    function updateGuardBadge(guardProbe) {
      var badge = document.getElementById('guard-badge');
      if (!badge) return;
      var probe = guardProbe || (LAST_STATUS && LAST_STATUS.traffic_guard) || {};
      var on = probe.config_status === 'on' || probe.mode === 'on';
      var rules = num(probe.rule_count) || 0;
      badge.className = 'ms-auto badge ops ' + (on && rules ? 'bg-primary' : 'bg-secondary');
      badge.textContent = on ? t('guard_badge_rules', rules) : t('guard_badge_off');
    }
    function guardRowHtml(row, idx) {
      var blockSel = row.policy === 'allow' ? '' : ' selected';
      var allowSel = row.policy === 'allow' ? ' selected' : '';
      return '<div class="d-flex flex-wrap align-items-center gap-2 mb-2 guard-row" data-guard-idx="' + idx + '">' +
        '<input type="text" class="form-control form-control-sm mono guard-domain" style="max-width:280px" ' +
          'value="' + esc(row.domain || '') + '" placeholder="' + esc(t('guard_domain_ph')) + '" ' +
          'aria-label="' + esc(t('guard_domain')) + '">' +
        '<select class="form-select form-select-sm guard-policy" style="max-width:150px" ' +
          'aria-label="' + esc(t('guard_policy')) + '">' +
          '<option value="block"' + blockSel + '>' + esc(t('guard_block')) + '</option>' +
          '<option value="allow"' + allowSel + '>' + esc(t('guard_allow')) + '</option>' +
        '</select>' +
        '<button type="button" class="btn btn-sm btn-outline-danger guard-remove" ' +
          'title="' + esc(t('guard_remove_row')) + '" aria-label="' + esc(t('guard_remove_row')) + '">' +
          '<i class="bi bi-trash"></i></button>' +
      '</div>';
    }
    function renderGuard() {
      var box = document.getElementById('guard-editor');
      if (!box) return;
      // auto-режим (#23): редактор read-only, показываем баннер вместо таблицы —
      // v1 не умеет представлять channel-map, а сохранение затёрло бы её.
      if (!GUARD_EDITABLE) {
        box.innerHTML =
          '<div class="alert alert-warning mb-0 d-flex align-items-start gap-2" role="alert">' +
            '<i class="bi bi-info-circle-fill"></i>' +
            '<div><div class="fw-semibold">' + esc(t('guard_mode_auto')) + '</div>' +
            '<div class="sub">' + esc(t('guard_auto_banner')) + '</div></div>' +
          '</div>';
        updateGuardBadge();
        return;
      }
      var busy = mutationInFlight();
      var on = guardModeOn();
      var rowsHtml = GUARD_MODEL.rows.length
        ? GUARD_MODEL.rows.map(guardRowHtml).join('')
        : '<div class="text-secondary ops mb-2">' + esc(t('guard_empty')) + '</div>';
      box.innerHTML =
        '<div class="d-flex flex-wrap align-items-center gap-3 mb-3">' +
          '<div class="form-check form-switch">' +
            '<input class="form-check-input" type="checkbox" role="switch" id="guard-mode-toggle"' +
              (on ? ' checked' : '') + (busy ? ' disabled' : '') + '>' +
            '<label class="form-check-label" for="guard-mode-toggle">' +
              esc(t('guard_mode')) + ': ' + esc(on ? t('guard_mode_on') : t('guard_mode_off')) + '</label>' +
          '</div>' +
        '</div>' +
        '<div class="guard-rows mb-2">' + rowsHtml + '</div>' +
        '<div class="d-flex flex-wrap gap-2 mb-2">' +
          '<button type="button" class="btn btn-sm btn-outline-secondary" id="guard-add"' + (busy ? ' disabled' : '') + '>' +
            '<i class="bi bi-plus-lg"></i> ' + esc(t('guard_add_row')) + '</button>' +
          '<button type="button" class="btn btn-sm btn-primary act" id="guard-save"' + (busy ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-save"></i> ' + esc(t('guard_save')) + '</span></button>' +
        '</div>' +
        '<div class="sub text-secondary">' + esc(t('guard_help')) + '</div>';
      updateGuardBadge();
    }
    function readGuardRowsFromDom() {
      /* Синхронизировать модель с текущими значениями input'ов перед мутацией. */
      var box = document.getElementById('guard-editor');
      if (!box) return;
      var rows = [];
      box.querySelectorAll('.guard-row').forEach(function (el) {
        var domain = el.querySelector('.guard-domain');
        var policy = el.querySelector('.guard-policy');
        rows.push({
          domain: domain ? domain.value : '',
          policy: (policy && policy.value === 'allow') ? 'allow' : 'block'
        });
      });
      GUARD_MODEL.rows = rows;
    }
    function saveGuard(btn) {
      readGuardRowsFromDom();
      var domains = guardRowsToDomains();
      var payload = { mode: GUARD_MODEL.mode, domains: domains };
      if (!tryBeginMutation('guard-save')) return;
      var lbl = btn.querySelector('.lbl');

      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      renderGuard();  // перерисовать в disabled-состоянии

      fetch('/api/guard', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) {
          return r.json().catch(function () { return { ok: false, errors: ['HTTP ' + r.status] }; })
            .then(function (res) { res._status = r.status; return res; });
        })
        .then(function (res) {
          if (res && res.ok) {
            GUARD_DIRTY = false;
            var probe = res.guard || {};

            updateGuardBadge(probe);

              ? res.errors.join('; ') : ('HTTP ' + (res && res._status ? res._status : 500));

            toast(t('guard_invalid', errs.slice(0, 220)), 'err');
            if (conflict) toast(t('guard_conflict_hint'), 'warn');

        .catch(function (e) { toast(t('guard_save_failed', e.message), 'err'); })
        .finally(function () {
          finishMutation();
          if (lbl) lbl.innerHTML = orig;
          renderGuard();
          // Подтянуть канонические counts/правила после записи.
          loadGuard();
        });

    function loadGuard() {
      return fetchJson('/api/guard')
        .then(function (payload) {
          syncGuardFromServer(payload);
          // Активный throttle приходит вместе с /api/guard (без токена) — синхронизируем.
          if (payload) syncThrottleFromServer(payload.throttle);

    /* ============================ Traffic Guard throttle (EXPERIMENTAL, #13/#22) ============================
       Отдельный runtime-механизм поверх guard: замедление ОДНОГО домена через pf/dummynet.
       Движок ещё не валидирован на реальном pf (automation ladder) — помечен experimental.
       THROTTLE_ACTIVE — public lease {domain, rate, needs_cleanup} без токена. */
    var THROTTLE_ACTIVE = null;
    var THROTTLE_INPUT = { domain: '', rate: '' };  // черновик полей до apply
    function publicThrottleFromServer(active) {
      return (active && active.domain)
        ? {
            domain: active.domain,
            rate: active.rate,
            needs_cleanup: !!active.needs_cleanup,
            cleanup_persisted: active.cleanup_persisted === true
          }
        : null;
    }
    function syncThrottleFromServer(active) {
      THROTTLE_ACTIVE = publicThrottleFromServer(active);
      renderThrottle();
    }
    function readThrottleInputFromDom() {
      var box = document.getElementById('throttle-editor');
      if (!box) return;
      var d = box.querySelector('#throttle-domain');
      var r = box.querySelector('#throttle-rate');
      THROTTLE_INPUT = { domain: d ? d.value : '', rate: r ? r.value : '' };
    }
    function renderThrottle() {
      var box = document.getElementById('throttle-editor');
      if (!box) return;
      var busy = mutationInFlight();
      var active = THROTTLE_ACTIVE;
      var cleanupRequired = !!(active && active.needs_cleanup);
      var activeHtml = cleanupRequired
        ? '<div class="alert alert-warning py-2 mb-2" role="status">' +
            '<i class="bi bi-exclamation-triangle me-1"></i>' +
            esc(t('throttle_cleanup_required', active.domain, fmtNumber(active.rate))) +
            '<div class="small mt-1">' + esc(t('throttle_cleanup_help')) + '</div></div>'
        : active
        ? '<div class="alert alert-info py-2 mb-2" role="status">' +
            '<i class="bi bi-hourglass-split me-1"></i>' +
            esc(t('throttle_active', active.domain, fmtNumber(active.rate))) + '</div>'
        : '<div class="text-secondary ops mb-2">' + esc(t('throttle_inactive')) + '</div>';
      // Поля apply отключаем, пока есть active/cleanup lease (одно-pipe движок: сначала clear).
      var inputsDisabled = (busy || !!active) ? ' disabled' : '';
      box.innerHTML =
        '<div class="d-flex align-items-center gap-2 mb-2">' +
          '<span class="fw-semibold">' + esc(t('throttle_title')) + '</span>' +
          '<span class="badge text-bg-warning">' + esc(t('throttle_experimental')) + '</span>' +
        '</div>' +
        activeHtml +
        '<div class="d-flex flex-wrap align-items-center gap-2 mb-2">' +
          '<input type="text" class="form-control form-control-sm mono" id="throttle-domain" style="max-width:280px" ' +
            'value="' + esc(THROTTLE_INPUT.domain) + '" placeholder="' + esc(t('throttle_domain_ph')) + '" ' +
            'aria-label="' + esc(t('throttle_domain')) + '"' + inputsDisabled + '>' +
          '<input type="number" min="1" step="1" class="form-control form-control-sm mono" id="throttle-rate" style="max-width:140px" ' +
            'value="' + esc(THROTTLE_INPUT.rate) + '" placeholder="' + esc(t('throttle_rate_ph')) + '" ' +
            'aria-label="' + esc(t('throttle_rate')) + '"' + inputsDisabled + '>' +
        '</div>' +
        '<div class="d-flex flex-wrap gap-2 mb-2">' +
          '<button type="button" class="btn btn-sm btn-primary act" id="throttle-apply"' +
            ((busy || !!active) ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-hourglass"></i> ' + esc(t('throttle_apply')) + '</span></button>' +
          '<button type="button" class="btn btn-sm btn-outline-danger act" id="throttle-clear"' +
            ((busy || !active) ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-x-octagon"></i> ' + esc(t('throttle_clear')) + '</span></button>' +
        '</div>' +
        '<div class="sub text-secondary">' + esc(t('throttle_help')) + '</div>';
    }
    function throttleRequest(payload, btn, okKey) {
      /* Общий apply/clear-запрос: MUTATION-лок, спиннер, toast для 400/403/409/cancelled. */
      if (!tryBeginMutation('throttle')) return;
      var lbl = btn ? btn.querySelector('.lbl') : null;
      var orig = lbl ? lbl.innerHTML : '';
      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      renderThrottle();  // перерисовать в disabled-состоянии
      fetch('/api/guard/throttle', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) {
          return r.json().catch(function () { return { ok: false, err: 'HTTP ' + r.status }; })
            .then(function (res) { res._status = r.status; return res; });
        })
        .then(function (res) {
          if (res && Object.prototype.hasOwnProperty.call(res, 'throttle')) {
            THROTTLE_ACTIVE = publicThrottleFromServer(res.throttle);
          } else if (res && res.active && res.active.domain) {
            THROTTLE_ACTIVE = publicThrottleFromServer(res.active);
          }
          if (res && res.cancelled) {
            toast(t('throttle_cancelled'), 'warn');
          } else if (res && res.ok) {
            if (payload.action === 'apply') THROTTLE_INPUT = { domain: '', rate: '' };
            toast(okKey === 'throttle_applied'
              ? t('throttle_applied', payload.domain) : t(okKey), 'ok');
          } else {
            var status = res && res._status;
            if (res && res.needs_cleanup && res.cleanup_persisted === false) {
              toast(t('throttle_cleanup_unrecoverable'), 'err');
            }
            else if (status === 409) { toast(t('throttle_conflict'), 'warn'); }
            else if (res && res.still_active) {
              // clear провалился: throttle всё ещё активен на pf — явный сигнал повторить.
              toast(t('throttle_clear_failed_active'), 'err');
            }
            else {
              var msg = (res && res.err) ? String(res.err).slice(0, 220)
                : ('HTTP ' + (status || 500));
              toast(t('throttle_failed', msg), 'err');
            }
          }
        })
        .catch(function (e) { toast(t('throttle_failed', e.message), 'err'); })
        .finally(function () {
          finishMutation();
          if (lbl) lbl.innerHTML = orig;
          renderThrottle();
        });
    }
    function applyThrottle(btn) {
      readThrottleInputFromDom();
      var domain = (THROTTLE_INPUT.domain || '').trim().toLowerCase();
      var rate = (THROTTLE_INPUT.rate || '').trim();
      if (!domain) { toast(t('throttle_need_domain'), 'warn'); return; }
      // Клиентская проверка rate: только положительное ЦЕЛОЕ в десятичной записи
      // (согласовано с сервером _valid_throttle_rate/isdigit; Number() пропускал бы 5e3/0x10).
      if (!/^[1-9][0-9]*$/.test(rate)) { toast(t('throttle_need_rate'), 'warn'); return; }
      throttleRequest({ action: 'apply', domain: domain, rate: parseInt(rate, 10) }, btn, 'throttle_applied');
    }
    function clearThrottle(btn) {
      throttleRequest({ action: 'clear' }, btn, 'throttle_cleared');
    }

    /* ============================ PF-изоляция доменов (isolate) ============================
       Канонично throttle-блоку: runtime-состояние + render + POST-запросы. Изоляция читается
       напрямую из /api/status (d.isolate), а не через отдельный эндпоинт (как throttle).
       Домены берутся из config (не input-поле) — кнопки только enable/disable/refresh. */
    var ISOLATE_ACTIVE = null;  // public lease {domains, ips, unresolved, ports, phase, applied_at}
    function publicIsolateFromServer(active) {
      return (active && active.domains && active.domains.length)
        ? {
            domains: active.domains || [],
            ips: active.ips || {},
            unresolved: active.unresolved || [],
            ports: active.ports || [80, 443],
            phase: active.phase || 'working',
            applied_at: active.applied_at || null
          }
        : null;
    }
    function syncIsolateFromServer(isolate) {
      ISOLATE_ACTIVE = publicIsolateFromServer(isolate);
      renderIsolate();
    }
    function countIsolateIps(ips) {
      var n = 0;
      for (var k in ips) { if (ips.hasOwnProperty(k)) n += (ips[k] || []).length; }
      return n;
    }
    function renderIsolate() {
      var box = document.getElementById('isolate-editor');
      if (!box) return;
      var busy = mutationInFlight();
      var active = ISOLATE_ACTIVE;
      var badge = document.getElementById('isolate-badge');
      var ipCount = active ? countIsolateIps(active.ips) : 0;
      var phaseLabel = active && active.phase === 'strict' ? t('isolate_phase_strict') : '';
      var activeHtml = active
        ? '<div class="alert alert-info py-2 mb-2" role="status">' +
            '<i class="bi bi-shield-lock me-1"></i>' +
            esc(t('isolate_active', active.domains.length, ipCount, (active.unresolved || []).length)) +
            (phaseLabel ? ' <span class="badge bg-warning text-dark ms-1">' + esc(phaseLabel) + '</span>' : '') +
            '</div>' +
            (active.unresolved && active.unresolved.length
              ? '<div class="small text-warning ops mb-2">' + esc(t('isolate_unresolved')) + ': ' +
                esc(active.unresolved.join(', ')) + '</div>' : '')
        : '<div class="text-secondary ops mb-2">' + esc(t('isolate_inactive')) + '</div>';
      if (badge) {
        if (!active) { badge.className = 'ms-auto badge bg-secondary ops'; badge.textContent = '—'; }
        else if (active.phase === 'strict') { badge.className = 'ms-auto badge bg-warning text-dark ops'; badge.textContent = 'STRICT'; }
        else { badge.className = 'ms-auto badge bg-success ops'; badge.textContent = 'ON'; }
      }
      box.innerHTML =
        '<div class="d-flex align-items-center gap-2 mb-2">' +
          '<span class="fw-semibold">' + esc(t('isolate_title')) + '</span>' +
          '<span class="badge text-bg-warning">' + esc(t('isolate_experimental')) + '</span>' +
        '</div>' +
        activeHtml +
        '<div class="d-flex flex-wrap gap-2 mb-2">' +
          '<button type="button" class="btn btn-sm btn-primary act" id="isolate-enable"' +
            ((busy || !!active) ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-shield-lock"></i> ' + esc(t('isolate_apply')) + '</span></button>' +
          '<button type="button" class="btn btn-sm btn-outline-danger act" id="isolate-disable"' +
            ((busy || !active) ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-x-octagon"></i> ' + esc(t('isolate_clear')) + '</span></button>' +
          '<button type="button" class="btn btn-sm btn-outline-secondary act" id="isolate-refresh"' +
            ((busy || !active) ? ' disabled' : '') + '>' +
            '<span class="lbl"><i class="bi bi-arrow-repeat"></i> ' + esc(t('isolate_refresh')) + '</span></button>' +
        '</div>' +
        '<div class="sub text-secondary">' + esc(t('isolate_help')) + '</div>';
    }
    function isolateRequest(payload, btn, okKey) {
      if (!tryBeginMutation('isolate')) return;
      var lbl = btn ? btn.querySelector('.lbl') : null;
      var orig = lbl ? lbl.innerHTML : '';
      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      renderIsolate();
      var url = '/api/isolate/' + payload.action;  // enable | disable | refresh
      fetch(url, {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) {
          return r.json().catch(function () { return { ok: false, err: 'HTTP ' + r.status }; })
            .then(function (res) { res._status = r.status; return res; });
        })
        .then(function (res) {
          if (res && Object.prototype.hasOwnProperty.call(res, 'isolate')) {
            ISOLATE_ACTIVE = publicIsolateFromServer(res.isolate);
          }
          if (res && res.cancelled) {
            toast(t('isolate_cancelled'), 'warn');
          } else if (res && res.ok) {
            toast(okKey === 'isolate_applied' ? t('isolate_applied') : t(okKey), 'ok');
          } else {
            var status = res && res._status;
            if (status === 409) { toast((res && res.err) ? String(res.err).slice(0, 220) : 'conflict', 'warn'); }
            else if (res && res.still_active) { toast('isolate still active — retry disable', 'err'); }
            else {
              var msg = (res && res.err) ? String(res.err).slice(0, 220) : ('HTTP ' + (status || 500));
              toast(t('isolate_failed', msg), 'err');
            }
          }
        })
        .catch(function (e) { toast(t('isolate_failed', e.message), 'err'); })
        .finally(function () {
          finishMutation();
          if (lbl) lbl.innerHTML = orig;
          renderIsolate();
        });
    }
    function enableIsolate(btn) { isolateRequest({ action: 'enable' }, btn, 'isolate_applied'); }
    function disableIsolate(btn) { isolateRequest({ action: 'disable' }, btn, 'isolate_cleared'); }
    function refreshIsolate(btn) { isolateRequest({ action: 'refresh' }, btn, 'isolate_refreshed'); }

      /* ---------- киношные карточки (класс cine → скрываются в Simple) ---------- */

      html += cineCard({ icon: 'bi-speedometer2', title: t('card_ping'),
        value: (pg.vps_ms != null ? pg.vps_ms + ' ' + t('ms') : '—'),
        sub: t('ping_sub', (pg.vps_loss != null ? pg.vps_loss : 0),

      var gd = d.geo_distance || {};
      html += cineCard({ icon: 'bi-rulers', title: t('card_distance'),
        value: (gd.km != null ? gd.km.toLocaleString() + ' ' + t('km') : '—'),
        sub: (gd.from_city || gd.to_city) ? esc(gd.from_city || '?') + ' → ' + esc(gd.to_city || '?') : t('no_geo'),

      var dns = d.dns || {};

      html += cineCard({ icon: 'bi-ethernet', title: t('card_ifaces'),

      var eiList = (eid.exits || []).map(function (e) {

        var ip = e.exit_ip ? esc(e.exit_ip) : '<span class="text-danger">' + esc(t('exit_ip_unknown')) + '</span>';
        return '<div class="ops">' + mark +
          '<span class="fw-semibold">' + esc(e.iface) + '</span> ' +
          '<span class="k">' + esc(e.local_ip || '—') + '</span> → ' + ip + '</div>';
      }).join('');
      html += cineCard({ icon: 'bi-globe', title: t('card_exit_ips'),
        value: (eid.exits || []).length + ' ' + t('active'),
        sub: eiList || t('no_data'), status: eid.status, col: 'col-12 col-md-6 col-xl-8' });

      document.getElementById('cards').innerHTML = html;
      renderFlow(d);
      renderNodeSelector(d, LAST_RANKING);
      renderChannel(d);
      // Badge Traffic Guard освежаем каждым поллингом из probe (сам редактор не трогаем,
      // если пользователь редактирует — синк правил идёт отдельно через loadGuard).
      updateGuardBadge(d.traffic_guard);
      if (!GUARD_LOADED && !GUARD_DIRTY) loadGuard();
      if (d.isolate) syncIsolateFromServer(d.isolate);
      if (mutationInFlight()) setMutationControlsDisabled(true);

      var ts = d.ts ? new Date(d.ts * 1000) : new Date();
      document.getElementById('updated').textContent = t('updated_at', ts.toLocaleTimeString());
    }

    function flowNode(n, roleLabel, live, opts) {
      opts = opts || {};
      var fl = n && n.country_code ? flag(n.country_code) : '';
      var cls = 'flow-node' + (live ? ' live' : '') + (opts.extraClass ? ' ' + opts.extraClass : '');
      var badge = opts.badge ? '<span class="leak-badge">' + esc(opts.badge) + '</span>' : '';
      var sub = opts.sub ? '<div class="meta">' + esc(opts.sub) + '</div>' : '';
      return '<div class="' + cls + '">' +
               '<div class="role">' + esc(roleLabel) + badge + '</div>' +
               '<div class="d-flex align-items-center gap-2">' +
                 '<span class="flag">' + (fl || '🌐') + '</span>' +
                 '<span class="ip mono">' + esc((n && n.ip) || '—') + '</span>' +
               '</div><div class="meta">' + geoLine(n) + '</div>' + sub + '</div>';
    }
    function flowArrow(rttMs) {
      var r = (typeof rttMs === 'number') ? (rttMs + ' ' + t('ms')) : '';
      return '<div class="flow-arrow"><div>→</div>' +
             (r ? '<div class="rtt mono">' + esc(r) + '</div>' : '') + '</div>';
    }
    function renderFlow(d) {
      var ips = d.ips || {}, ping = d.ping || {};
      var direct = ips.direct || {}, chain = ips.chain || {}, vps = ips.vps || {};
      // leak: выход цепочки == прямой выход => реальный IP наружу мимо цепочки.
      var leak = !!(chain.ip && direct.ip && chain.ip === direct.ip);
      // RTT честно (находка #5): vps_ms = local→VPS (route_ip) — ребро, входящее в VPS;
      // vpn_ms = local→VPN-сервер — свойство узла прямого/VPN-выхода, не ребро цепочки;
      // сегмент VPS→Internet мы не измеряем, RTT там не ставим.
      var vpnSub = (typeof ping.vpn_ms === 'number')
        ? 'VPN ' + ping.vpn_ms + ' ' + t('ms') : '';
      var strip =
        flowNode(direct, t('node_vpn_exit'), true, { sub: vpnSub }) +
        flowArrow(null) +
        flowNode(chain, t('node_chain'), true,
                 leak ? { extraClass: 'leak', badge: t('flow_leak') } : {}) +
        flowArrow(ping.vps_ms) +
        flowNode(vps, t('node_vps'), true) +
        flowArrow(null) +
        '<div class="flow-node"><div class="role">' + esc(t('node_internet')) +
          '</div><div class="d-flex align-items-center gap-2"><span class="flag">🌍</span>' +
          '<span class="ip">' + esc(t('node_world')) + '</span></div>' +
          '<div class="meta">' + esc(t('node_world_sub')) + '</div></div>';
      document.getElementById('flow-strip').innerHTML = strip;
      var fb = document.getElementById('flow-badge');
      fb.className = 'ms-auto badge ops ' + badgeClass(ips.status);
      fb.textContent = badgeText(ips.status);
    }

      FETCH_FAILED = true;
      var keys = [
        ['bi-reception-4', 'card_anthropic'],
        ['bi-reception-4', 'card_openai'],
        ['bi-hdd-network', 'card_tunnel'],
        ['bi-globe', 'card_direct'],

      ];

      document.getElementById('cards').innerHTML = html;
      var fs = document.getElementById('flow-strip');
      if (fs) fs.innerHTML = '<div class="text-secondary ops">' + esc(t('no_server')) + '</div>';

        gb.textContent = '—';

      if (cb) {
        cb.className = 'ms-auto badge bg-secondary ops';

    /* ============================ Polling ============================ */
    var inFlight = false;
    var currentPoll = null;
    var paused = false;
    var refreshBtn = document.getElementById('refreshBtn');

    function setRefreshing(on) {
      refreshBtn.disabled = on;
      refreshBtn.querySelector('i').className = on ? 'bi bi-arrow-clockwise pulse' : 'bi bi-arrow-clockwise';
    }

    function fetchJson(url) {
      return fetch(url, { headers: { 'Accept': 'application/json' }, cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
    }

    function poll(manual) {
      if (inFlight) {
        if (manual) {
          return (currentPoll || Promise.resolve()).then(function () { return poll(true); });
        }
        return currentPoll || Promise.resolve();
      }
      if (paused && !manual) return Promise.resolve();
      inFlight = true;
      setRefreshing(true);
      currentPoll = fetchJson('/api/status')
        .then(function (d) {
          return fetchJson('/api/nodes/ranking')
            .catch(function () { return {}; })
            .then(function (ranking) { render(d, ranking); });
        })
        .catch(function (e) {
          renderFetchFailed();
          toast(t('fetch_status_failed', e.message), 'err');
        })
        .finally(function () {
          inFlight = false;
          setRefreshing(false);
          currentPoll = null;
        });
      return currentPoll;
    }

    refreshBtn.addEventListener('click', function () { poll(true); });

    /* ============================ Actions ============================ */
    function handleNodeSelect(btn) {
      var name = btn.getAttribute('data-node-name') || '';
      if (!name) return;
      if (!tryBeginMutation('node-select')) return;
      var nextApply = null;
      NODE_APPLY = { name: name, state: 'pending' };
      renderNodeSelector(LAST_STATUS || { nodes: [] }, LAST_RANKING || {});
      setMutationControlsDisabled(true);
      var buttons = document.querySelectorAll('.node-select');
      btn = Array.prototype.filter.call(buttons, function (b) {
        return b.getAttribute('data-node-name') === name;
      })[0] || btn;
      var lbl = btn.querySelector('.lbl');
      var orig = lbl ? lbl.innerHTML : '';
      buttons.forEach(function (b) { b.disabled = true; });
      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

      fetch('/api/node/select/' + encodeURIComponent(name), { method: 'POST', headers: { 'Accept': 'application/json' } })
        .then(function (r) {
          return r.json().catch(function () { return { ok: r.ok, error: 'HTTP ' + r.status }; })
            .then(function (res) { res._status = r.status; return res; });
        })
        .then(function (res) {
          if (res && res.cancelled) {
            nextApply = null;
            toast(t('node_select_cancelled'), 'warn');
          } else if (res && res.ok) {
            nextApply = null;
            toast(t('node_select_ok', res.active || name), 'ok');
          } else {
            var detail = (res && (res.error || res.err || res.out)) ? String(res.error || res.err || res.out)
              : ('HTTP ' + (res && res._status ? res._status : 500));
            if (res && res.step) detail = t('node_apply_step', res.step) + ' · ' + detail;
            nextApply = { name: name, state: 'failed', step: res && res.step, error: detail };
            toast(t('node_select_err', name, detail.slice(0, 200)), 'err');
          }
        })
        .catch(function (e) {
          nextApply = { name: name, state: 'failed', error: e.message };
          toast(t('node_select_err', name, e.message), 'err');
        })
        .finally(function () {
          return poll(true).finally(function () {
            if (lbl) lbl.innerHTML = orig;
            NODE_APPLY = nextApply;
            renderNodeSelector(LAST_STATUS || { nodes: [] }, LAST_RANKING || {});
            finishMutation();
          });
        });
    }

    function handleChannelSwitch(btn) {
      var target = btn.getAttribute('data-channel-target') || '';
      if (CHANNEL_TARGETS.indexOf(target) === -1) return;
      if (!tryBeginMutation('channel-switch')) return;
      var nextApply = null;
      CHANNEL_APPLY = { target: target, state: 'pending' };
      renderChannel(LAST_STATUS || {});
      setMutationControlsDisabled(true);
      // renderChannel пересоздал DOM — ищем кнопку цели заново, чтобы показать спиннер в ней.
      var buttons = document.querySelectorAll('.channel-switch');
      btn = Array.prototype.filter.call(buttons, function (b) {
        return b.getAttribute('data-channel-target') === target;
      })[0] || btn;
      var lbl = btn ? btn.querySelector('.lbl') : null;
      var orig = lbl ? lbl.innerHTML : '';
      buttons.forEach(function (b) { b.disabled = true; });
      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

      fetch('/api/channel/' + encodeURIComponent(target), { method: 'POST', headers: { 'Accept': 'application/json' } })
        .then(function (r) {
          // 403 (CSRF-guard) / 409 / 5xx могут прийти без JSON-тела — не роняем цепочку.
          return r.json().catch(function () { return { ok: false, err: 'HTTP ' + r.status }; })
            .then(function (res) { res._status = r.status; return res; });
        })
        .then(function (res) {
          if (res && res.cancelled) {
            nextApply = null;
            toast(t('channel_switch_cancelled'), 'warn');
          } else if (res && res.ok) {
            nextApply = null;
            var okMsg = t('channel_switch_ok', channelTargetLabel(target));
            if (res.service) okMsg += ' · ' + String(res.service).slice(0, 80);
            toast(okMsg, 'ok');
          } else {
            var detail = (res && (res.err || res.error || res.out)) ? String(res.err || res.error || res.out)
              : ('HTTP ' + (res && res._status ? res._status : 500));
            nextApply = { target: target, state: 'failed', error: detail };
            toast(t('channel_switch_err', channelTargetLabel(target), detail.slice(0, 200)), 'err');
          }
        })
        .catch(function (e) {
          nextApply = { target: target, state: 'failed', error: e.message };
          toast(t('channel_switch_err', channelTargetLabel(target), e.message), 'err');
        })
        .finally(function () {
          return poll(true).finally(function () {
            if (lbl) lbl.innerHTML = orig;
            CHANNEL_APPLY = nextApply;
            renderChannel(LAST_STATUS || {});
            finishMutation();
          });
        });
    }

    /* ---------- Traffic Guard: клики по строкам/кнопкам редактора ---------- */
    document.addEventListener('click', function (ev) {
      var addBtn = ev.target.closest('#guard-add');
      if (addBtn) {
        if (mutationInFlight()) { toast(t('action_in_progress'), 'warn'); return; }
        readGuardRowsFromDom();
        // Не плодим пустые строки: если последняя ещё не заполнена — подсказать, а не добавлять.
        var last = GUARD_MODEL.rows[GUARD_MODEL.rows.length - 1];
        if (last && !(last.domain || '').trim()) {
          toast(t('guard_no_domain'), 'warn');
          return;
        }
        // Предупредить о дубликате домена: при save он молча схлопнется (последняя политика победит).
        var seen = {}, dup = '';
        GUARD_MODEL.rows.forEach(function (row) {
          var d = (row.domain || '').trim().toLowerCase();
          if (!d) return;
          if (seen[d]) dup = dup || d;
          seen[d] = true;
        });
        if (dup) toast(t('guard_dup_domain', dup), 'warn');
        GUARD_MODEL.rows.push({ domain: '', policy: 'block' });
        GUARD_DIRTY = true;
        renderGuard();
        return;
      }
      var rmBtn = ev.target.closest('.guard-remove');
      if (rmBtn) {
        if (mutationInFlight()) { toast(t('action_in_progress'), 'warn'); return; }
        var rowEl = rmBtn.closest('.guard-row');
        var idx = rowEl ? parseInt(rowEl.getAttribute('data-guard-idx'), 10) : -1;
        readGuardRowsFromDom();
        if (idx >= 0 && idx < GUARD_MODEL.rows.length) GUARD_MODEL.rows.splice(idx, 1);
        GUARD_DIRTY = true;
        renderGuard();
        return;
      }
    });

    /* Правки полей редактора → dirty (защита от перезаписи поллингом). */
    document.addEventListener('input', function (ev) {
      if (ev.target.closest('#guard-editor') && ev.target.closest('.guard-row')) GUARD_DIRTY = true;
      // throttle-поля: держим черновик в модели, чтобы re-render (язык/поллинг) его не терял.
      if (ev.target.closest('#throttle-editor') &&
          (ev.target.id === 'throttle-domain' || ev.target.id === 'throttle-rate')) {
        readThrottleInputFromDom();
      }
    });
    document.addEventListener('change', function (ev) {
      if (ev.target.id === 'guard-mode-toggle') {
        readGuardRowsFromDom();
        GUARD_MODEL.mode = ev.target.checked ? 'on' : 'off';
        GUARD_DIRTY = true;
        renderGuard();
      }
    });

    document.addEventListener('click', function (ev) {
      var btn = ev.target.closest('.act');
      if (!btn) return;
      if (btn.classList.contains('node-select')) {
        handleNodeSelect(btn);
        return;
      }
      if (btn.classList.contains('channel-switch')) {
        handleChannelSwitch(btn);
        return;
      }
      if (btn.id === 'guard-save') {
        saveGuard(btn);
        return;
      }
      if (btn.id === 'throttle-apply') {
        applyThrottle(btn);
        return;
      }
      if (btn.id === 'throttle-clear') {
        clearThrottle(btn);
        return;
      }
      if (btn.id === 'isolate-enable') {
        enableIsolate(btn);
        return;
      }
      if (btn.id === 'isolate-disable') {
        disableIsolate(btn);
        return;
      }
      if (btn.id === 'isolate-refresh') {
        refreshIsolate(btn);
        return;
      }
      if (btn.id === 'git-proxy-toggle') {
        toggleGitProxy(btn);
        return;
      }
      if (btn.id === 'claude-proxy-toggle') {
        toggleCProxy(btn);
        return;
      }
      if (!tryBeginMutation('action', ev)) return;
      var url = btn.getAttribute('data-url');
      var lbl = btn.querySelector('.lbl');
      var orig = lbl ? lbl.innerHTML : '';
      if (lbl) lbl.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

      fetch(url, { method: 'POST', headers: { 'Accept': 'application/json' } })
        .then(function (r) { return r.json().catch(function () { return { ok: r.ok }; }); })
        .then(function (res) {
          if (res && res.cancelled) {
            toast(t('cancelled'), 'warn');
          } else if (res && res.ok) {
            toast(res.out ? t('ok_req_out', url, String(res.out).slice(0, 120))
                          : t('ok_req', url), 'ok');
          } else {
            var msg = (res && (res.err || res.out)) ? String(res.err || res.out).slice(0, 200)
                                                    : ('rc=' + (res && res.rc));
            toast(t('err_req', url, msg), 'err');
          }
        })
        .catch(function (e) { toast(t('req_failed', url, e.message), 'err'); })
        .finally(function () {
          return poll(true).finally(function () {
            if (lbl) lbl.innerHTML = orig;
            finishMutation();
          });
        });
    });

    /* ============================ Language wiring ============================ */
    var langSel = document.getElementById('langSel');
    langSel.value = LANG;
    langSel.addEventListener('change', function () {
      LANG = langSel.value;
      localStorage.setItem('lang', LANG);
      applyStaticI18n();
      // Сохранить несохранённые правки редактора и перерисовать его с новыми переводами.
      readGuardRowsFromDom();
      renderGuard();
      readThrottleInputFromDom();
      renderThrottle();
      renderIsolate();
      renderGitProxy();
      renderCProxy();
      poll(true);
    });
    applyStaticI18n();

    /* ============================ Mode (Simple / Cinematic) ============================ */
    var modeBtn = document.getElementById('modeBtn');
    function applyMode() {
      var simple = localStorage.getItem('mode') === 'simple';
      document.body.classList.toggle('mode-simple', simple);
      modeBtn.querySelector('i').className = simple ? 'bi bi-eye-slash' : 'bi bi-eye';
      modeBtn.setAttribute('title', t(simple ? 'mode_simple' : 'mode_cinematic'));
    }
    modeBtn.addEventListener('click', function () {
      localStorage.setItem('mode', localStorage.getItem('mode') === 'simple' ? 'cinematic' : 'simple');
      applyMode();
    });
    applyMode();

    /* ============================ Boot ============================ */
    renderGuard();     // пустой каркас редактора сразу, до первого ответа сервера
    renderThrottle();  // каркас throttle-контрола (inactive) до ответа сервера
    renderIsolate();   // каркас isolate-контрола (inactive) до ответа сервера
    renderGitProxy();  // каркас git-proxy (inactive) до ответа сервера
    renderCProxy();    // каркас claude-proxy (inactive) до ответа сервера
    loadGuard();       // подтянуть block/allow правила + активный throttle из /api/guard
    fetchJson('/api/git-proxy').then(function (p) {
      GIT_PROXY_ON = !!(p && p.enabled);
      GIT_PROXY_URL = (p && p.proxy) || '';
      renderGitProxy();
    }).catch(function () { /* тихо: останется каркас */ });
    fetchJson('/api/claude-proxy').then(function (p) {
      CPROXY_ON = !!(p && p.enabled);
      CPROXY_URL = (p && p.proxy) || '';
      renderCProxy();
    }).catch(function () { /* тихо: останется каркас */ });
    poll(true);
    setInterval(poll, 5000);
  })();
  </script>
</body>
</html>
