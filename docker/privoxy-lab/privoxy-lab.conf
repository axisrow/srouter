# srouter privoxy-лаборатория: минимальный конфиг для эксперимента (#123).
# На базе templates/privoxy.config (srouter-managed, чистый), но адаптирован для контейнера:
# - listen 0.0.0.0:8119 (0.0.0.0 для проброса наружу; 8119 — не конфликт с host-privoxy 8118).
# - forward в host-xray через host.docker.internal (macOS Docker Desktop резолвит host).
# - debug 8192: трассировка коннектов (host-config этого не делал — слепое пятно для поимки причины).
# - БЕЗ elliptic-curve-keys (non-fatal error, убран для чистого сигнала падения).
# - privoxy --no-daemon пишет Info в stdout/stderr → docker logs ( logfile не задаём).

listen-address  0.0.0.0:8119
toggle  1
enable-remote-toggle  0
enable-edit-actions 0
enforce-blocks 0
buffer-limit 4096
forward-socks5t / host.docker.internal:10808 .
debug 8192
